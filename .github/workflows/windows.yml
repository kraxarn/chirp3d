name: Windows

on: [ push, pull_request ]

env:
  BUILD_TYPE: Release
  CMAKE_GENERATOR: "Ninja"

jobs:
  build:
    name: '${{ matrix.arch }}'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: 'x86_64'
            compile-flags: '-march=x86-64-v3'

          # TODO: Has issues with Jolt for some reason
          # - os: windows-latest
          #   arch: 'x86'
          #   compile-flags: '-march=i686 -m32 -mavx2 -mfxsr -mf16c'

          - os: windows-11-arm
            arch: 'arm64'

    steps:
      - uses: actions/checkout@v5

      - name: Set up compiler
        if: ${{ matrix.arch == 'x86_64' || matrix.arch == 'x86' }}
        uses: egor-tensin/setup-clang@v2
        with:
          version: 'latest'
          cc: '1'

      # setup-clang uses choco which doesn't support arm64
      - name: Set up compiler
        if: ${{ matrix.arch == 'arm64' }}
        shell: powershell
        run: |
          Install-Module -Name Microsoft.WinGet.Client -AcceptLicense -Force
          Install-WinGetPackage -Id LLVM.LLVM
          $bin_dir = Join-Path (Join-Path $env:ProgramFiles LLVM) bin
          echo $bin_dir >> $env:GITHUB_PATH

      - name: Configure CMake
        run: cmake -S . -B build -D ENABLE_TESTS=ON -G "${{env.CMAKE_GENERATOR}}" -D CMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -D CMAKE_C_FLAGS="${{matrix.compile-flags}}" -D CMAKE_CXX_FLAGS="${{matrix.compile-flags}}"

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --extra-verbose --test-dir build\tests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chirp3d-windows-${{ matrix.arch }}
          path: |
            ${{runner.workspace}}\chirp3d\build\chirp3d.exe
            ${{runner.workspace}}\chirp3d\build\SDL3.dll
