name: Android

on: [ push, pull_request ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: '${{ matrix.arch }}'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: 'arm64-v8a'
          - arch: 'armeabi-v7a'

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare signing
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PROPERTIES: ${{ secrets.KEYSTORE_PROPERTIES }}
        run: |
          echo "$KEYSTORE_FILE" | base64 -d > "android/app/release.keystore"
          echo "$KEYSTORE_PROPERTIES" > "android/keystore.properties"

      - name: Build
        working-directory: ${{runner.workspace}}/chirp3d/android
        env:
          ANDROID_ABI: ${{ matrix.arch }}
        run: ./gradlew --info assembleRelease

      - name: Prepare upload
        working-directory: ${{runner.workspace}}/chirp3d/android/app/build/outputs/apk/release
        env:
          ANDROID_ABI: ${{ matrix.arch }}
        run: mv "app-release.apk" "chirp3d-android-$ANDROID_ABI.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: chirp3d-android-${{matrix.arch}}
          archive: false
          path: android/app/build/outputs/apk/release/*.apk
